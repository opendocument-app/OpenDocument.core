name: conan

on:
  release:
    types: [published]

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 1G
  CCACHE_KEY_SUFFIX: r1
  CONAN_HOME: ${{ github.workspace }}/.conan2
  CONAN_KEY_SUFFIX: r1

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, build_profile: ubuntu-24.04-clang-18, host_profile: ubuntu-24.04-clang-18 }
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: checkout conan-odr-index
        run: git submodule update --init --depth 1 conan-odr-index

      - name: ubuntu install ccache
        if: runner.os == 'Linux'
        run: |
          sudo apt install ccache
          ccache -V
      - name: macos install ccache
        if: runner.os == 'macOS'
        run: |
          brew install ccache
          ccache -V

      - name: set up python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14
      - name: install python dependencies
        run: pip install --upgrade pip conan

      - name: get version
        run: echo "VERSION=${GITHUB_REF_NAME:1}" >> $GITHUB_ENV

      - name: cache conan
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ env.CONAN_HOME }}
          key: conan-${{ matrix.host_profile }}-${{ env.CONAN_KEY_SUFFIX }}
          restore-keys: |
            conan-${{ matrix.host_profile }}-

      - name: export conan-odr-index
        run: python conan-odr-index/scripts/conan_export_all_packages.py
      - name: conan config
        run: conan config install .github/config/conan

      - name: cache ccache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.host_profile }}-${{ env.CCACHE_KEY_SUFFIX }}
          restore-keys: |
            ccache-${{ matrix.host_profile }}-

      - name: conan install
        run: >
          conan install .
          --lockfile conan.lock
          --profile:host '${{ matrix.host_profile }}'
          --profile:build '${{ matrix.build_profile }}'
          --build missing

      - name: create conan package
        run: >
          conan create .
          --lockfile=conan.lock
          --profile:host '${{ matrix.host_profile }}'
          --profile:build '${{ matrix.build_profile }}'
          --name odrcore
          --version ${VERSION}
          --build missing
